<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Shathi AI</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fefefe;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }
    .user, .shathi {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
    }
    .user {
      background-color: #d1e7dd;
      align-self: flex-end;
      margin-left: auto;
    }
    .shathi {
      background-color: #f8d7da;
      align-self: flex-start;
    }
    #input {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
    }
    #input input {
      flex: 1;
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 10px;
    }
    #input button {
      margin-left: 10px;
      padding: 10px 20px;
      border: none;
      background: #5a189a;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="input">
  <input type="text" id="text" placeholder="Shathi’র সাথে কথা বলো...">
  <button onclick="sendMessage()">পাঠাও</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("text");

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  // User message
  const userDiv = document.createElement("div");
  userDiv.className = "user";
  userDiv.textContent = text;
  chat.appendChild(userDiv);

  input.value = "";

  // Typing indicator
  const shathiDiv = document.createElement("div");
  shathiDiv.className = "shathi";
  shathiDiv.textContent = "লিখছি...";
  chat.appendChild(shathiDiv);
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    shathiDiv.textContent = data.reply || "উফ! কিছু সমস্যা হয়েছে 😅";
  } catch (err) {
    shathiDiv.textContent = "উফ! আমি একটু সমস্যায় পড়েছি 😅 পরে চেষ্টা করো।";
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
